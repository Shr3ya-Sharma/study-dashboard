<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study OS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f3f4f8;
--card:#ffffff;
--text:#111827;
--accent:#6366f1;
--border:#e5e7eb;
--shadow:0 10px 25px rgba(0,0,0,0.08);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#e5e7eb;
--accent:#818cf8;
--border:#334155;
}

body{
margin:0;
font-family:Inter,system-ui,Arial;
background:var(--bg);
color:var(--text);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 26px;
background:var(--card);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:10;
}

.tabs{display:flex;gap:10px}

nav button{
border:none;
padding:8px 16px;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
font-weight:600;
}

.container{
padding:28px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:22px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:20px;
box-shadow:var(--shadow);
}

.focus-card{
grid-column:1/-1;
}

.clock{
font-size:64px;
font-weight:700;
letter-spacing:2px;
text-align:center;
}

.hidden{display:none}

textarea{
width:100%;
height:140px;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
font-family:inherit;
}

input,select{
padding:6px;
border-radius:6px;
border:1px solid var(--border);
margin:4px 0;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
grid-auto-rows:110px;
gap:6px;
}

.day{
border:1px solid var(--border);
border-radius:10px;
padding:4px;
font-size:12px;
}

.weekday{
text-align:center;
font-weight:600;
padding-bottom:4px;
}

.event{
padding:2px 4px;
border-radius:4px;
font-size:11px;
color:white;
margin-top:2px;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.entry{
border:1px solid var(--border);
border-radius:10px;
padding:10px;
margin-top:8px;
}

</style>
</head>

<body>

<nav>

<div class="tabs">
<button onclick="switchTab('study')">Study</button>
<button onclick="switchTab('calendar')">Calendar</button>
<button onclick="switchTab('writing')">Writing</button>
<button onclick="switchTab('ec')">EC Planning</button>
</div>

<button onclick="toggleTheme()">Dark / Light</button>

</nav>

<!-- STUDY TAB -->

<div id="studyTab" class="container">

<div class="card focus-card">
<div id="liveClock" class="clock"></div>
</div>

<div class="card focus-card">
<h2>Daily Study Time</h2>
<canvas id="studyLine"></canvas>
</div>

<div class="card">
<h3>Log Study Session</h3>
<input id="subjectInput" placeholder="Subject">
<input id="minutesInput" type="number" placeholder="Minutes">
<button onclick="addSession()">Add</button>
</div>

<div class="card">
<h3>Pomodoro</h3>
<input id="focusInput" type="number" value="25"> Focus
<input id="breakInput" type="number" value="5"> Break

<div id="timerDisplay" style="font-size:36px;margin-top:10px">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
</div>

</div>

<!-- CALENDAR TAB -->

<div id="calendarTab" class="container hidden">

<div class="card" style="grid-column:1/-1">

<div class="calendar-header">
<button onclick="prevMonth()">◀</button>
<h2 id="calendarTitle"></h2>
<button onclick="nextMonth()">▶</button>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

</div>

<div class="card">
<h3>Add Event</h3>
<input type="date" id="eventDate">
<input id="eventTitle" placeholder="Event">
<input type="color" id="eventColor" value="#6366f1">
<button onclick="addEvent()">Add</button>
</div>

</div>

<!-- WRITING TAB -->

<div id="writingTab" class="container hidden">

<div class="card focus-card">
<h2>Writing Journal</h2>

<input id="entryTitle" placeholder="Title">
<textarea id="entryText" placeholder="Write something beautiful..."></textarea>

<button onclick="saveEntry()">Save Entry</button>

<div id="entries"></div>

</div>

</div>

<!-- EC TAB -->

<div id="ecTab" class="container hidden">

<div class="card">
<h3>Extracurricular Planning</h3>

<input id="ecName" placeholder="Activity">
<input id="ecGoal" placeholder="Goal">

<button onclick="addEC()">Add</button>

<ul id="ecList"></ul>

</div>

<div class="card">
<h3>Ideas / Planning</h3>
<textarea id="ecNotes" placeholder="Plan events, competitions, leadership ideas..."></textarea>
</div>

</div>

<script>

/* CLOCK */

function updateClock(){

const now=new Date()

const formatter=new Intl.DateTimeFormat('en-US',{
 timeZone:'America/New_York',
 hour:'2-digit',
 minute:'2-digit',
 second:'2-digit',
 hour12:true
})

liveClock.textContent=formatter.format(now)

}

setInterval(updateClock,1000)
updateClock()

/* TABS */

function switchTab(tab){

studyTab.classList.add('hidden')
calendarTab.classList.add('hidden')
writingTab.classList.add('hidden')
ecTab.classList.add('hidden')

if(tab==='study')studyTab.classList.remove('hidden')
if(tab==='calendar')calendarTab.classList.remove('hidden')
if(tab==='writing')writingTab.classList.remove('hidden')
if(tab==='ec')ecTab.classList.remove('hidden')

}

function toggleTheme(){
 document.body.classList.toggle('dark')
}

/* STUDY DATA */

let sessions=JSON.parse(localStorage.getItem('sessions'))||[]
let lineChart

function addSession(){

let subject=subjectInput.value
let minutes=parseInt(minutesInput.value)

if(!subject||!minutes)return

let today=new Date().toISOString().slice(0,10)

sessions.push({subject,minutes,date:today})

localStorage.setItem('sessions',JSON.stringify(sessions))

updateLine()

}

function updateLine(){

let totals={}

sessions.forEach(s=>{

if(!totals[s.date])totals[s.date]=0

totals[s.date]+=s.minutes

})

let labels=Object.keys(totals)
let data=Object.values(totals)

if(lineChart)lineChart.destroy()

lineChart=new Chart(studyLine,{

 type:'line',
 data:{
 labels:labels,
 datasets:[{
 label:'Minutes Studied',
 data:data,
 tension:0.3
 }]
 }

})

}

updateLine()

/* TIMER */

let timer
let timeLeft=1500

function startTimer(){

clearInterval(timer)

 timer=setInterval(()=>{

 timeLeft--

 let m=Math.floor(timeLeft/60)
 let s=timeLeft%60

 if(s<10)s='0'+s

 timerDisplay.textContent=m+':'+s

 if(timeLeft<=0){
 clearInterval(timer)
 }

 },1000)

}

function pauseTimer(){clearInterval(timer)}

/* CALENDAR */

let currentDate=new Date()

let events=JSON.parse(localStorage.getItem('events'))||[]

function renderCalendar(){

calendarGrid.innerHTML=''

let year=currentDate.getFullYear()
let month=currentDate.getMonth()

calendarTitle.textContent=currentDate.toLocaleString('default',{month:'long',year:'numeric'})

let weekdays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']

weekdays.forEach(d=>{

let w=document.createElement('div')
w.className='weekday'
w.textContent=d
calendarGrid.appendChild(w)

})

let firstDay=new Date(year,month,1).getDay()
let days=new Date(year,month+1,0).getDate()

for(let i=0;i<firstDay;i++){

calendarGrid.appendChild(document.createElement('div'))

}

for(let d=1;d<=days;d++){

let cell=document.createElement('div')
cell.className='day'

cell.innerHTML='<b>'+d+'</b>'

let dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

 events.filter(e=>e.date===dateStr).forEach(e=>{

let ev=document.createElement('div')
ev.className='event'
ev.style.background=e.color

ev.textContent=e.title

cell.appendChild(ev)

 })

calendarGrid.appendChild(cell)

}

}

function addEvent(){

let date=eventDate.value
let title=eventTitle.value
let color=eventColor.value

if(!date||!title)return

 events.push({date,title,color})

localStorage.setItem('events',JSON.stringify(events))

renderCalendar()

}

function prevMonth(){
currentDate.setMonth(currentDate.getMonth()-1)
renderCalendar()
}

function nextMonth(){
currentDate.setMonth(currentDate.getMonth()+1)
renderCalendar()
}

renderCalendar()

/* WRITING */

let entries=JSON.parse(localStorage.getItem('entries'))||[]

function saveEntry(){

let title=entryTitle.value
let text=entryText.value

if(!title||!text)return

entries.push({title,text,date:new Date().toLocaleDateString()})

localStorage.setItem('entries',JSON.stringify(entries))

entryTitle.value=''
entryText.value=''

renderEntries()

}

function renderEntries(){

entriesDiv=entriesContainer=document.getElementById('entries')
entriesDiv.innerHTML=''

entries.forEach(e=>{

let div=document.createElement('div')
div.className='entry'

div.innerHTML='<b>'+e.title+'</b><br><small>'+e.date+'</small><p>'+e.text+'</p>'

entriesDiv.appendChild(div)

})

}

renderEntries()

/* EC */

let ecs=JSON.parse(localStorage.getItem('ecs'))||[]

function addEC(){

let name=ecName.value
let goal=ecGoal.value

if(!name)return

ecs.push({name,goal})

localStorage.setItem('ecs',JSON.stringify(ecs))

renderEC()

}

function renderEC(){

let list=document.getElementById('ecList')
list.innerHTML=''

 ecs.forEach(e=>{

let li=document.createElement('li')
li.textContent=e.name+' - '+e.goal

list.appendChild(li)

 })

}

renderEC()

</script>

</body>
</html>
