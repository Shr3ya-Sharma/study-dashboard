<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f6f7fb;
--card:#ffffff;
--text:#1f2937;
--accent:#6366f1;
--border:#e5e7eb;
--shadow:0 6px 18px rgba(0,0,0,0.08);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#e5e7eb;
--accent:#818cf8;
--border:#334155;
}

body{
margin:0;
font-family:Inter,system-ui,Arial;
background:var(--bg);
color:var(--text);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 24px;
background:var(--card);
border-bottom:1px solid var(--border);
}

nav button{
border:none;
padding:8px 14px;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}

.nav-left{display:flex;gap:10px}
.controls{display:flex;gap:10px}

.container{
padding:24px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px;
box-shadow:var(--shadow);
}

.hidden{display:none}

.timer{font-size:44px;font-weight:bold;margin:10px 0}

.task{display:flex;gap:8px;margin:4px 0}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
grid-auto-rows:120px;
gap:6px;
}

.day{
border:1px solid var(--border);
border-radius:8px;
padding:6px;
font-size:12px;
display:flex;
flex-direction:column;
}

.day-number{
font-weight:bold;
margin-bottom:4px;
}

.event{
padding:2px 4px;
border-radius:4px;
font-size:11px;
color:white;
margin-top:2px;
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.calendar-header button{
background:var(--accent);
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

input,select{
padding:6px;
border-radius:6px;
border:1px solid var(--border);
margin:4px 0;
}

</style>
</head>

<body>

<nav>

<div class="nav-left">
<button onclick="switchTab('study')">Study</button>
<button onclick="switchTab('calendar')">Calendar</button>
</div>

<div class="controls">
<button onclick="toggleTheme()">Dark / Light</button>
<input type="color" id="accentPicker">
</div>

</nav>

<!-- STUDY TAB -->

<div id="studyTab" class="container">

<div class="card" style="grid-column:1/-1;text-align:center">
<h2>Current Time</h2>
<div id="liveClock" style="font-size:32px;font-weight:bold"></div>
</div>

<div class="card">
<h3>Pomodoro Timer</h3>

<label>Focus Minutes</label>
<input id="focusInput" type="number" value="25">

<label>Break Minutes</label>
<input id="breakInput" type="number" value="5">

<div id="timerDisplay" class="timer">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<p id="timerMode">Focus Session</p>

</div>

<div class="card">
<h3>Tasks</h3>
<input id="taskInput" placeholder="New task">
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>

<div class="card">
<h3>Log Study Session</h3>
<input id="subjectInput" placeholder="Subject">
<input id="minutesInput" type="number" placeholder="Minutes">
<button onclick="addSession()">Add</button>
<ul id="sessionList"></ul>
</div>

<div class="card">
<h3>Study Time by Subject</h3>
<canvas id="studyChart"></canvas>
</div>

</div>

<!-- CALENDAR TAB -->

<div id="calendarTab" class="container hidden">

<div class="card" style="grid-column:1/-1">

<div class="calendar-header">
<button onclick="prevMonth()">◀</button>
<h3 id="calendarTitle"></h3>
<button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendarGrid"></div>

</div>

<div class="card">
<h3>Add Calendar Event</h3>

<label>Date</label>
<input type="date" id="eventDate">

<label>Title</label>
<input id="eventTitle" placeholder="Event">

<label>Color</label>
<input type="color" id="eventColor" value="#6366f1">

<button onclick="addEvent()">Add Event</button>

</div>

</div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* ---------- LIVE CLOCK (NEW YORK TIME) ---------- */

function updateClock(){

const now = new Date()

const formatter = new Intl.DateTimeFormat('en-US',{
 timeZone:'America/New_York',
 hour:'2-digit',
 minute:'2-digit',
 second:'2-digit',
 hour12:true
})

const timeString = formatter.format(now)

const label = `New York Time (EST/EDT)`

const clock = document.getElementById('liveClock')

if(clock){
 clock.innerHTML = `${timeString}<div style="font-size:12px;opacity:0.7">${label}</div>`
}

}

setInterval(updateClock,1000)
updateClock()

/* ---------- TAB ---------- */

function switchTab(tab){
if(tab==='study'){

studyTab.classList.remove('hidden')
calendarTab.classList.add('hidden')

}else{

calendarTab.classList.remove('hidden')
studyTab.classList.add('hidden')

}
}

/* ---------- THEME ---------- */

function toggleTheme(){
document.body.classList.toggle('dark')
}

accentPicker.oninput=e=>{
document.documentElement.style.setProperty('--accent',e.target.value)
}

/* ---------- TASKS ---------- */

let tasks=JSON.parse(localStorage.getItem('tasks'))||[]

function saveTasks(){localStorage.setItem('tasks',JSON.stringify(tasks))}

function renderTasks(){

let list=taskList
list.innerHTML=''

 tasks.forEach((t,i)=>{

let li=document.createElement('li')
li.className='task'

let box=document.createElement('input')
box.type='checkbox'
box.checked=t.done

box.onchange=()=>{
 tasks[i].done=box.checked
 saveTasks()
}

let span=document.createElement('span')
span.textContent=t.text

li.appendChild(box)
li.appendChild(span)

list.appendChild(li)

 })
}

function addTask(){

if(!taskInput.value)return

tasks.push({text:taskInput.value,done:false})

taskInput.value=''

saveTasks()
renderTasks()

}

renderTasks()

/* ---------- TIMER ---------- */

let timer
let timeLeft=1500
let focus=true

function updateTimer(){

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

if(s<10)s='0'+s

 timerDisplay.textContent=m+':'+s

}

function startTimer(){

clearInterval(timer)

 timer=setInterval(()=>{

 timeLeft--
updateTimer()

 if(timeLeft<=0){

 alarm.play()

 focus=!focus

 let focusMin=focusInput.value*60
 let breakMin=breakInput.value*60

 timeLeft=focus?focusMin:breakMin

 timerMode.textContent=focus?'Focus Session':'Break'

 }

 },1000)

}

function pauseTimer(){clearInterval(timer)}

function resetTimer(){
clearInterval(timer)
 timeLeft=focusInput.value*60
updateTimer()
}

updateTimer()

/* ---------- STUDY SESSIONS ---------- */

let sessions=JSON.parse(localStorage.getItem('sessions'))||[]
let chart

function saveSessions(){
localStorage.setItem('sessions',JSON.stringify(sessions))
}

function renderSessions(){

sessionList.innerHTML=''

 sessions.forEach(s=>{

let li=document.createElement('li')
li.textContent=s.subject+' - '+s.minutes+' min'

sessionList.appendChild(li)

 })
}

function addSession(){

let subject=subjectInput.value
let minutes=parseInt(minutesInput.value)

if(!subject||!minutes)return

 sessions.push({subject,minutes})

saveSessions()

renderSessions()
updateChart()

}

renderSessions()

function updateChart(){

let totals={}

 sessions.forEach(s=>{

 if(!totals[s.subject])totals[s.subject]=0
 totals[s.subject]+=s.minutes

 })

let labels=Object.keys(totals)
let data=Object.values(totals)

 if(chart)chart.destroy()

 chart=new Chart(studyChart,{

 type:'bar',

 data:{
 labels:labels,
 datasets:[{
 label:'Minutes Studied',
 data:data
 }]
 },

 options:{
 responsive:true,
 interaction:{mode:'index'},
 plugins:{tooltip:{enabled:true}}
 }

 })

}

updateChart()

/* ---------- CALENDAR ---------- */

let currentDate=new Date()

let events=JSON.parse(localStorage.getItem('events'))||[]

function saveEvents(){
localStorage.setItem('events',JSON.stringify(events))
}

function renderCalendar(){

calendarGrid.innerHTML=''

let year=currentDate.getFullYear()
let month=currentDate.getMonth()

let firstDay=new Date(year,month,1).getDay()
let days=new Date(year,month+1,0).getDate()

calendarTitle.textContent=currentDate.toLocaleString('default',{month:'long',year:'numeric'})

for(let i=0;i<firstDay;i++){

let empty=document.createElement('div')
calendarGrid.appendChild(empty)

}

for(let d=1;d<=days;d++){

let cell=document.createElement('div')
cell.className='day'

let num=document.createElement('div')
num.className='day-number'
num.textContent=d

cell.appendChild(num)

let dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

 events.filter(e=>e.date===dateStr).forEach(e=>{

let ev=document.createElement('div')
ev.className='event'

ev.style.background=e.color

ev.textContent=e.title

cell.appendChild(ev)

 })

calendarGrid.appendChild(cell)

}

}

function addEvent(){

let date=eventDate.value
let title=eventTitle.value
let color=eventColor.value

if(!date||!title)return

 events.push({date,title,color})

saveEvents()
renderCalendar()

}

function prevMonth(){
currentDate.setMonth(currentDate.getMonth()-1)
renderCalendar()
}

function nextMonth(){
currentDate.setMonth(currentDate.getMonth()+1)
renderCalendar()
}

renderCalendar()

</script>

</body>
</html>
